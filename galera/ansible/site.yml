---
# =============================================================================
# MariaDB Galera Cluster - Multi-Cluster Playbook
# =============================================================================
# Usage:
#   ansible-playbook site.yml                    # Full deploy (all clusters)
#   ansible-playbook site.yml --tags prod        # Only prod cluster
#   ansible-playbook site.yml --tags dev         # Only dev cluster
#   ansible-playbook site.yml --tags loadbalancer # Reconfigure LB (both clusters)
#   ansible-playbook site.yml --tags monitoring  # Reconfigure monitoring
#   ansible-playbook site.yml --tags backup      # Reconfigure backup
# =============================================================================

# =============================================================================
# Phase 1-6: Prod Galera cluster (galera-1/2/3, .51-.53)
# =============================================================================

- name: "Prod: Base system"
  hosts: galera_prod
  tags: [common, prod]
  roles:
    - common

- name: "Prod: Firewall"
  hosts: galera_prod
  tags: [firewall, prod]
  roles:
    - firewall

- name: "Prod: MariaDB"
  hosts: galera_prod
  tags: [mariadb, prod]
  roles:
    - mariadb

- name: "Prod: Galera cluster"
  hosts: galera_prod
  tags: [galera, bootstrap, prod]
  roles:
    - galera

- name: "Prod: mysqld_exporter"
  hosts: galera_prod
  tags: [exporter, prod]
  roles:
    - prometheus-exporter

- name: "Prod: Backup"
  hosts: galera_prod
  tags: [backup, prod]
  roles:
    - backup

# =============================================================================
# Phase 7-12: Dev Galera cluster (galera-dev-1/2/3, .61-.63)
# =============================================================================

- name: "Dev: Base system"
  hosts: galera_dev
  tags: [common, dev]
  roles:
    - common

- name: "Dev: Firewall"
  hosts: galera_dev
  tags: [firewall, dev]
  roles:
    - firewall

- name: "Dev: MariaDB"
  hosts: galera_dev
  tags: [mariadb, dev]
  roles:
    - mariadb

- name: "Dev: Galera cluster"
  hosts: galera_dev
  tags: [galera, bootstrap, dev]
  roles:
    - galera

- name: "Dev: mysqld_exporter"
  hosts: galera_dev
  tags: [exporter, dev]
  roles:
    - prometheus-exporter

- name: "Dev: Backup"
  hosts: galera_dev
  tags: [backup, dev]
  roles:
    - backup

# =============================================================================
# Phase 13: Shared Load Balancer (lb-1, .55)
# =============================================================================

- name: "Shared: HAProxy"
  hosts: loadbalancer
  tags: [loadbalancer, haproxy]
  roles:
    - haproxy

- name: "Shared: ProxySQL"
  hosts: loadbalancer
  tags: [loadbalancer, proxysql]
  roles:
    - proxysql

# =============================================================================
# Phase 14: Shared Monitoring (grafana-1, .54)
# =============================================================================

- name: "Shared: Prometheus + Grafana"
  hosts: monitoring
  tags: [monitoring, grafana]
  roles:
    - monitoring
