---
# =============================================================================
# Rola: haproxy - Load Balancer dla Galera (Opcja A)
# =============================================================================

- name: Zainstaluj HAProxy i xinetd
  dnf:
    name:
      - haproxy
      - xinetd
    state: present

- name: Utworz katalog dla skryptu health check
  file:
    path: /usr/local/bin
    state: directory
    mode: '0755'

- name: Wdróż skrypt health check dla Galera
  template:
    src: galera_check.sh.j2
    dest: /usr/local/bin/galera_check.sh
    owner: root
    group: root
    mode: '0755'

- name: Skonfiguruj xinetd dla galera_check
  template:
    src: galera_check.xinetd.j2
    dest: /etc/xinetd.d/galera_check
    owner: root
    group: root
    mode: '0644'
  notify: restart xinetd

- name: Dodaj usługę galera_check do /etc/services
  lineinfile:
    path: /etc/services
    line: "galera_check\t9200/tcp\t\t\t# Galera health check"
    state: present
  notify: restart xinetd

- name: Wlacz i uruchom xinetd
  systemd:
    name: xinetd
    state: started
    enabled: yes

- name: Skonfiguruj HAProxy
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: '0644'
    validate: 'haproxy -c -f %s'
  notify: restart haproxy

- name: Wlacz i uruchom HAProxy
  systemd:
    name: haproxy
    state: started
    enabled: yes

- name: Wyswietl informacje o HAProxy
  debug:
    msg: |
      HAProxy skonfigurowany!

      Porty:
      - Write pool: {{ haproxy_write_port }} (single-master)
      - Read pool: {{ haproxy_read_port }} (round-robin)
      - Stats UI: http://{{ ansible_host }}:{{ haproxy_stats_port }}/stats

      Connection strings dla aplikacji:
      - Write: mysql -h {{ ansible_host }} -P {{ haproxy_write_port }} -u app_user -p
      - Read:  mysql -h {{ ansible_host }} -P {{ haproxy_read_port }} -u app_user -p
