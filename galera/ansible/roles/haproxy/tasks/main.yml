---
# =============================================================================
# Rola: haproxy - Load Balancer dla Galera (Opcja A)
# =============================================================================

- name: Install firewalld
  ansible.builtin.dnf:
    name:
      - firewalld
      - python3-firewall
    state: present

- name: Enable and start firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true

- name: Install SELinux management tools
  ansible.builtin.dnf:
    name:
      - policycoreutils-python-utils
    state: present

- name: Allow HAProxy to bind any port (SELinux)
  ansible.posix.seboolean:
    name: haproxy_connect_any
    state: true
    persistent: true

- name: Zainstaluj HAProxy
  ansible.builtin.dnf:
    name: haproxy
    state: present

- name: Skonfiguruj HAProxy
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: '0644'
    validate: 'haproxy -c -f %s'
  notify: restart haproxy

- name: Open firewall ports for HAProxy
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "{{ haproxy_write_port }}/tcp"
    - "{{ haproxy_read_port }}/tcp"
    - "{{ haproxy_stats_port }}/tcp"

- name: Wlacz i uruchom HAProxy
  ansible.builtin.systemd:
    name: haproxy
    state: started
    enabled: true
