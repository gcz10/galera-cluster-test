---
# --- Prometheus (binary install) ---
- name: Create prometheus system user
  ansible.builtin.user:
    name: prometheus
    system: true
    shell: /sbin/nologin
    create_home: false

- name: Create Prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: "0755"
  loop:
    - /etc/prometheus
    - /var/lib/prometheus

- name: Download Prometheus
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: /tmp/prometheus.tar.gz
    mode: "0644"

- name: Extract Prometheus
  ansible.builtin.unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp/
    remote_src: true

- name: Install Prometheus binaries
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  loop:
    - prometheus
    - promtool

- name: Create Prometheus systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/prometheus.service
    content: |
      [Unit]
      Description=Prometheus
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=prometheus
      Group=prometheus
      Type=simple
      ExecStart=/usr/local/bin/prometheus \
        --config.file=/etc/prometheus/prometheus.yml \
        --storage.tsdb.path=/var/lib/prometheus \
        --web.listen-address=0.0.0.0:{{ prometheus_port }}

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  notify: Restart prometheus

- name: Configure Prometheus
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: "0644"
  notify: Restart prometheus

# --- Grafana (RPM) ---
- name: Add Grafana RPM repository
  ansible.builtin.yum_repository:
    name: grafana
    description: Grafana OSS
    baseurl: https://rpm.grafana.com
    gpgcheck: true
    gpgkey: https://rpm.grafana.com/gpg.key
    sslverify: true
    sslcacert: /etc/pki/tls/certs/ca-bundle.crt

- name: Install Grafana
  ansible.builtin.dnf:
    name: grafana
    state: present

- name: Configure Grafana datasource
  ansible.builtin.template:
    src: grafana-datasource.yml.j2
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: root
    group: grafana
    mode: "0640"
  notify: Restart grafana

- name: Configure Grafana dashboard provider
  ansible.builtin.template:
    src: grafana-dashboard-provider.yml.j2
    dest: /etc/grafana/provisioning/dashboards/default.yml
    owner: root
    group: grafana
    mode: "0640"
  notify: Restart grafana

- name: Create Grafana dashboards directory
  ansible.builtin.file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"

- name: Copy Grafana dashboards
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/var/lib/grafana/dashboards/{{ item }}"
    owner: grafana
    group: grafana
    mode: "0644"
  loop:
    - galera-dashboard.json
    - mysql-overview-percona.json
    - mysql-galera-cluster.json
    - PXC_Galera_Cluster_Summary.json
    - PXC_Galera_Node_Summary.json
    - PXC_Galera_Nodes_Compare.json
    - MySQL_Instance_Summary.json
    - MySQL_InnoDB_Details.json
    - haproxy-dashboard.json
    - proxysql-dashboard.json
  notify: Restart grafana

# --- Firewall & services ---
- name: Install firewalld
  ansible.builtin.dnf:
    name:
      - firewalld
      - python3-firewall
    state: present

- name: Enable and start firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true

- name: Open firewall ports for monitoring services
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "{{ prometheus_port }}/tcp"
    - "{{ grafana_port }}/tcp"
    - "{{ pmm_port }}/tcp"

- name: Enable and start Prometheus
  ansible.builtin.systemd:
    name: prometheus
    state: started
    enabled: true
    daemon_reload: true

- name: Enable and start Grafana
  ansible.builtin.systemd:
    name: grafana-server
    state: started
    enabled: true

# --- PMM Server (Docker) ---
- name: Add Docker CE repo
  ansible.builtin.shell: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  args:
    creates: /etc/yum.repos.d/docker-ce.repo
  when: pmm_enabled | default(true)

- name: Install Docker
  ansible.builtin.dnf:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
  when: pmm_enabled | default(true)

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  when: pmm_enabled | default(true)

- name: Create PMM data volume
  ansible.builtin.command: docker volume create {{ pmm_data_volume }}
  register: pmm_volume_create
  changed_when: "'already exists' not in pmm_volume_create.stderr"
  failed_when: false
  when: pmm_enabled | default(true)

- name: Check if PMM container exists
  ansible.builtin.command: docker inspect pmm-server
  register: pmm_container_check
  changed_when: false
  failed_when: false
  when: pmm_enabled | default(true)

- name: Start PMM Server container
  ansible.builtin.command: >
    docker run -d
    --name pmm-server
    --restart always
    -p {{ pmm_port }}:443
    -v {{ pmm_data_volume }}:/srv
    {{ pmm_image }}
  when: pmm_enabled | default(true) and pmm_container_check.rc != 0

- name: Ensure PMM container is running
  ansible.builtin.command: docker start pmm-server
  register: pmm_start
  changed_when: "'already started' not in pmm_start.stderr"
  failed_when: false
  when: pmm_enabled | default(true) and pmm_container_check.rc == 0

# --- Cleanup ---
- name: Clean up Prometheus temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/prometheus.tar.gz
    - "/tmp/prometheus-{{ prometheus_version }}.linux-amd64"
