---
# =============================================================================
# Rola: proxysql - Load Balancer dla Galera
# Wymaga: community.proxysql collection (ansible-galaxy collection install community.proxysql)
# =============================================================================

- name: Install firewalld
  ansible.builtin.dnf:
    name:
      - firewalld
      - python3-firewall
    state: present

- name: Enable and start firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true

- name: Open firewall ports for ProxySQL
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "{{ proxysql_port }}/tcp"
    - "{{ proxysql_admin_port }}/tcp"

- name: Dodaj repozytorium ProxySQL
  ansible.builtin.copy:
    dest: /etc/yum.repos.d/proxysql.repo
    content: |
      [proxysql]
      name = ProxySQL
      baseurl = https://repo.proxysql.com/ProxySQL/proxysql-2.7.x/centos/$releasever
      gpgcheck = 1
      gpgkey = https://repo.proxysql.com/ProxySQL/proxysql-2.7.x/repo_pub_key
      enabled = 1
    owner: root
    group: root
    mode: '0644'

- name: Zainstaluj ProxySQL i zaleznosci
  ansible.builtin.dnf:
    name:
      - proxysql
      - mysql
      - python3-PyMySQL
    state: present
    update_cache: true

- name: Wlacz i uruchom ProxySQL
  ansible.builtin.systemd:
    name: proxysql
    state: started
    enabled: true

- name: Poczekaj na uruchomienie ProxySQL
  ansible.builtin.wait_for:
    port: "{{ proxysql_admin_port }}"
    host: 127.0.0.1
    delay: 5
    timeout: 60

# -----------------------------------------------------------------------------
# Bootstrap: zmiana domyslnego hasla admin (shell — edge case)
# Modul proxysql_global_variables nie obsluguje admin variables,
# wiec ta jedyna operacja zostaje jako shell.
# -----------------------------------------------------------------------------

- name: Sprawdz czy haslo admin jest juz ustawione
  ansible.builtin.shell: |
    mysql -u admin -p'{{ proxysql_admin_password }}' -h 127.0.0.1 -P {{ proxysql_admin_port }} -e "SELECT 1" 2>/dev/null
  no_log: true
  register: proxysql_admin_check
  changed_when: false
  failed_when: false

- name: Ustaw haslo admin ProxySQL
  ansible.builtin.shell: |
    mysql -u admin -padmin -h 127.0.0.1 -P {{ proxysql_admin_port }} -e "
    UPDATE global_variables SET variable_value='admin:{{ proxysql_admin_password }}'
    WHERE variable_name='admin-admin_credentials';
    LOAD ADMIN VARIABLES TO RUNTIME;
    SAVE ADMIN VARIABLES TO DISK;
    "
  no_log: true
  changed_when: true
  when: proxysql_admin_check.rc != 0

# -----------------------------------------------------------------------------
# Konfiguracja przez community.proxysql modules
# -----------------------------------------------------------------------------

- name: Konfiguruj zmienne monitoringu
  community.proxysql.proxysql_global_variables:
    login_user: "{{ proxysql_admin_user }}"
    login_password: "{{ proxysql_admin_password }}"
    login_host: 127.0.0.1
    login_port: "{{ proxysql_admin_port }}"
    variable: "{{ item.variable }}"
    value: "{{ item.value }}"
    load_to_runtime: true
    save_to_disk: true
  loop:
    - variable: mysql-monitor_username
      value: "{{ proxysql_monitor_user }}"
    - variable: mysql-monitor_password
      value: "{{ proxysql_monitor_password }}"
    - variable: mysql-monitor_galera_healthcheck_interval
      value: "{{ proxysql_monitor_interval }}"
    - variable: mysql-monitor_connect_timeout
      value: "{{ proxysql_monitor_connect_timeout }}"
    - variable: mysql-monitor_ping_timeout
      value: "{{ proxysql_monitor_ping_timeout }}"
  no_log: true

- name: Konfiguruj Galera hostgroups
  community.proxysql.proxysql_galera_hostgroups:
    login_user: "{{ proxysql_admin_user }}"
    login_password: "{{ proxysql_admin_password }}"
    login_host: 127.0.0.1
    login_port: "{{ proxysql_admin_port }}"
    writer_hostgroup: "{{ proxysql_writer_hostgroup }}"
    backup_writer_hostgroup: "{{ proxysql_backup_writer_hostgroup }}"
    reader_hostgroup: "{{ proxysql_reader_hostgroup }}"
    offline_hostgroup: "{{ proxysql_offline_hostgroup }}"
    max_writers: "{{ proxysql_max_writers }}"
    writer_is_also_reader: "{{ proxysql_writer_is_also_reader }}"
    max_transactions_behind: "{{ proxysql_max_transactions_behind }}"
    active: 1
    state: present
    load_to_runtime: true
    save_to_disk: true
  no_log: true

- name: Dodaj serwery Galera
  community.proxysql.proxysql_backend_servers:
    login_user: "{{ proxysql_admin_user }}"
    login_password: "{{ proxysql_admin_password }}"
    login_host: 127.0.0.1
    login_port: "{{ proxysql_admin_port }}"
    hostgroup_id: "{{ proxysql_writer_hostgroup }}"
    hostname: "{{ hostvars[item].ansible_host }}"
    port: "{{ galera_mysql_port | default(3306) }}"
    weight: 1000
    max_connections: "{{ proxysql_max_connections }}"
    state: present
    load_to_runtime: true
    save_to_disk: true
  loop: "{{ groups['galera'] }}"
  no_log: true

- name: Dodaj uzytkownikow aplikacji
  community.proxysql.proxysql_mysql_users:
    login_user: "{{ proxysql_admin_user }}"
    login_password: "{{ proxysql_admin_password }}"
    login_host: 127.0.0.1
    login_port: "{{ proxysql_admin_port }}"
    username: "{{ item.name }}"
    password: "{{ item.password }}"
    default_hostgroup: "{{ proxysql_writer_hostgroup }}"
    transaction_persistent: true
    active: true
    state: present
    load_to_runtime: true
    save_to_disk: true
  loop: "{{ app_users | default([]) }}"
  no_log: true

- name: Konfiguruj query rule - SELECT FOR UPDATE do writera
  community.proxysql.proxysql_query_rules:
    login_user: "{{ proxysql_admin_user }}"
    login_password: "{{ proxysql_admin_password }}"
    login_host: 127.0.0.1
    login_port: "{{ proxysql_admin_port }}"
    rule_id: 1
    active: true
    match_pattern: "^SELECT .* FOR UPDATE"
    destination_hostgroup: "{{ proxysql_writer_hostgroup }}"
    apply: true
    state: present
    load_to_runtime: true
    save_to_disk: true
  no_log: true

- name: Konfiguruj query rule - SELECT do readera
  community.proxysql.proxysql_query_rules:
    login_user: "{{ proxysql_admin_user }}"
    login_password: "{{ proxysql_admin_password }}"
    login_host: 127.0.0.1
    login_port: "{{ proxysql_admin_port }}"
    rule_id: 2
    active: true
    match_pattern: "^SELECT"
    destination_hostgroup: "{{ proxysql_reader_hostgroup }}"
    apply: true
    state: present
    load_to_runtime: true
    save_to_disk: true
  no_log: true

# -----------------------------------------------------------------------------
# Prometheus exporter for ProxySQL
# -----------------------------------------------------------------------------

- name: Download proxysql_exporter
  ansible.builtin.get_url:
    url: "https://github.com/percona/proxysql_exporter/releases/download/v{{ proxysql_exporter_version }}/proxysql_exporter_linux_amd64.tar.gz"
    dest: /tmp/proxysql_exporter.tar.gz
    checksum: "{{ proxysql_exporter_checksum }}"
    mode: "0644"

- name: Create temp extraction directory
  ansible.builtin.file:
    path: /tmp/proxysql_exporter_extract
    state: directory
    mode: "0755"

- name: Extract proxysql_exporter
  ansible.builtin.unarchive:
    src: /tmp/proxysql_exporter.tar.gz
    dest: /tmp/proxysql_exporter_extract/
    remote_src: true

- name: Install proxysql_exporter binary
  ansible.builtin.shell: |
    find /tmp/proxysql_exporter_extract -name proxysql_exporter -type f -exec cp {} /usr/local/bin/proxysql_exporter \;
    chmod 0755 /usr/local/bin/proxysql_exporter
  args:
    creates: /usr/local/bin/proxysql_exporter

- name: Create proxysql_exporter systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/proxysql_exporter.service
    content: |
      [Unit]
      Description=ProxySQL Exporter
      Wants=network-online.target
      After=network-online.target proxysql.service

      [Service]
      Type=simple
      Environment="DATA_SOURCE_NAME=admin:{{ proxysql_admin_password }}@tcp(127.0.0.1:{{ proxysql_admin_port }})/"
      ExecStart=/usr/local/bin/proxysql_exporter \
        --web.listen-address=0.0.0.0:{{ proxysql_exporter_port }}
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  no_log: true
  notify: restart proxysql_exporter

- name: Open firewall port for proxysql_exporter
  ansible.posix.firewalld:
    port: "{{ proxysql_exporter_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true

- name: Enable and start proxysql_exporter
  ansible.builtin.systemd:
    name: proxysql_exporter
    state: started
    enabled: true
    daemon_reload: true

- name: Clean up proxysql_exporter temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/proxysql_exporter.tar.gz
    - /tmp/proxysql_exporter_extract
