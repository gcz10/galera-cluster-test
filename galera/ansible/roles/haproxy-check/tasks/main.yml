---
# Deploy legacy xinetd-based health check on Galera nodes for HAProxy.

- name: Fail on Rocky Linux 9 and newer
  ansible.builtin.fail:
    msg: >-
      The haproxy-check role requires xinetd, which is not available on Rocky Linux 9+.
      Leave galera_enable_haproxy_check=false and use HAProxy's native mysql-check instead.
  when:
    - ansible_distribution == "Rocky"
    - ansible_distribution_major_version is version('9', '>=')

- name: Zainstaluj xinetd
  ansible.builtin.dnf:
    name: xinetd
    state: present

- name: Wdróż skrypt health check dla Galera
  ansible.builtin.template:
    src: galera_check.sh.j2
    dest: /usr/local/bin/galera_check.sh
    owner: root
    group: root
    mode: '0755'

- name: Skonfiguruj xinetd dla galera_check
  ansible.builtin.template:
    src: galera_check.xinetd.j2
    dest: /etc/xinetd.d/galera_check
    owner: root
    group: root
    mode: '0644'
  notify: restart xinetd

- name: Dodaj usługę galera_check do /etc/services
  ansible.builtin.lineinfile:
    path: /etc/services
    line: "galera_check\t9200/tcp\t\t\t# Galera health check"
    state: present
  notify: restart xinetd

- name: Open firewall port for health check
  ansible.posix.firewalld:
    port: "9200/tcp"
    permanent: true
    state: enabled
    immediate: true

- name: Wlacz i uruchom xinetd
  ansible.builtin.systemd:
    name: xinetd
    state: started
    enabled: true
