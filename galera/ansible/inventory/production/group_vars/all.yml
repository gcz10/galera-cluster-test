---
# =============================================================================
# Globalna konfiguracja klastra MariaDB Galera
# =============================================================================

# Nazwa klastra (unikalna dla kazdego klastra)
galera_cluster_name: "galera_cluster"

# Wersja MariaDB LTS
mariadb_version: "11.4"

# =============================================================================
# Uzytkownicy bazy danych
# =============================================================================
# WAZNE: W produkcji uzyj ansible-vault do szyfrowania hasel!
# ansible-vault encrypt_string 'twoje_haslo' --name 'zmienna'

galera_root_password: "ChangeMe!Galera2024"
galera_backup_user: "backup_user"
galera_backup_password: "ChangeMe!Backup2024"
galera_monitor_user: "monitor"
galera_monitor_password: "ChangeMe!Monitor2024"

# Uzytkownik dla HAProxy health check (na przyszlosc)
haproxy_check_user: "haproxy_check"
haproxy_check_password: "ChangeMe!HaProxy2024"

# Uzytkownik dla ProxySQL (na przyszlosc)
proxysql_monitor_user: "proxysql_monitor"
proxysql_monitor_password: "ChangeMe!ProxySQL2024"
proxysql_admin_password: "ChangeMe!ProxySQLAdmin2024"

# Uzytkownicy aplikacji (dodaj wlasnych)
app_users:
  - name: "sbtest"
    password: "SbTest2024"
    priv: "*.*:ALL PRIVILEGES"

# =============================================================================
# Konfiguracja sieci
# =============================================================================

# Porty Galera
galera_mysql_port: 3306
galera_cluster_port: 4567
galera_ist_port: 4568
galera_sst_port: 4444

# Porty load balancera (na przyszlosc)
# haproxy_write_port: 3306
# haproxy_read_port: 3307
# haproxy_stats_port: 8404
# proxysql_port: 6033
# proxysql_admin_port: 6032

# =============================================================================
# Konfiguracja wydajnosci
# =============================================================================

# Procent RAM dla InnoDB buffer pool (0.7 = 70%)
innodb_buffer_pool_ratio: 0.7

# Rozmiar GCache (min 2G dla produkcji)
galera_gcache_size: "2G"

# Watki replikacji (2x liczba CPU cores)
galera_slave_threads: 8

# Max polaczen MySQL
mysql_max_connections: 500

# =============================================================================
# SSL/TLS (opcjonalnie)
# =============================================================================

galera_ssl_enabled: false
# galera_ssl_ca: "/etc/mysql/ssl/ca-cert.pem"
# galera_ssl_cert: "/etc/mysql/ssl/server-cert.pem"
# galera_ssl_key: "/etc/mysql/ssl/server-key.pem"

# =============================================================================
# Backup
# =============================================================================

backup_dir: "/var/backups/mariadb"
backup_retention_days: 30
backup_full_schedule: "0 2 * * 0"      # Niedziela 2:00
backup_incr_schedule: "0 */4 * * 1-6"  # Co 4h pon-sob

# =============================================================================
# Timezone
# =============================================================================

timezone: "Europe/Warsaw"

# =============================================================================
# NTP/Chrony
# =============================================================================

ntp_servers:
  - "0.pl.pool.ntp.org"
  - "1.pl.pool.ntp.org"
  - "2.pl.pool.ntp.org"
